<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
<style>
  text{font-family:"Noto Sans CJK TC","Noto Sans CJK JP","Microsoft JhengHei",sans-serif;fill:#111827}
